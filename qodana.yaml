#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

version: "1.0"

# 🔥 Use proper JVM linter
linter: jetbrains/qodana-jvm:2025.2

# 🔥 Project JDK
projectJDK: "21"

# 🔥 Inspection Profile
profile:
  name: qodana.recommended

# 🔥 Include additional inspections (optional)
include:
  - name: SpringBootApplicationProperties
  - name: SpringJavaAutowiredFieldsWarningInspection

# 🔥 Exclude unnecessary folders (IMPORTANT)
exclude:
  - name: All
    paths:
      - target
      - build
      - logs
      - node_modules
      - .git

# 🔥 Bootstrap (optional script before run)
# bootstrap: sh ./prepare-qodana.sh

# 🔥 Plugins (optional)
# plugins:
#   - id: org.jetbrains.plugins.spring

# 🔥 Quality Gate (VERY IMPORTANT FOR CI/CD)
failureConditions:
  severityThresholds:
    any: 50          # total issues allowed
    critical: 5      # critical issues limit
    high: 10         # high severity limit
    moderate: 20     # medium issues
    low: 30

# 🔥 Code Coverage (if using tests)
# (Works with Ultimate plans)
#failureConditions:
#  testCoverageThresholds:
#    fresh: 70
#    total: 50

# 🔥 Cache directory (improves performance)
cacheDir: .qodana/cache

# 🔥 Save report
resultsDir: .qodana/results

# 🔥 Run in CI mode
run:
  timeout: 900   # seconds (15 min)