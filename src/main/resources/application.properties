# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=gatbunndhan
server.port=9090

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=mySuperSecretKeyForJwtTokenThatIsVerySecure12345
jwt.expiration=86400000

# ==========================================
# DATABASE CONFIGURATION (PostgreSQL)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gathbandhan
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ==========================================
# DEVTOOLS CONFIGURATION
# ==========================================
spring.devtools.restart.enabled=true

# ==========================================
# EMAIL CONFIGURATION (Production - Gmail SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-specific-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.from=noreply@gathbandhan.com

# ==========================================
# APPLICATION BASE URL
# ==========================================
app.base-url=http://localhost:9090
spring.devtools.livereload.enabled=true

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# ==========================================
# STATIC FILE STORAGE
# ==========================================
file.upload-dir=uploads/

# ==========================================
# JACKSON / JSON CONFIGURATION
# ==========================================
spring.mvc.converters.preferred-json-mapper=jackson

# ==========================================
# PERFORMANCE (HikariCP)
# ==========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================
# SQL FILE EXECUTION
# ==========================================
spring.sql.init.mode=never

# ==========================================
# FLYWAY (future ready)
# ==========================================
spring.flyway.enabled=false

# ==========================================
# RAZORPAY CONFIGURATION
# ==========================================
razorpay.api.key=rzp_test_1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
razorpay.api.secret=1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ

# ==========================================
# APPLICATION BASE URL
# ==========================================
app.base-url=http://localhost:9090

# ==========================================
# SMS CONFIGURATION
# ==========================================
app.sms.enabled=false
msg91.auth.key=your-msg91-auth-key-here
