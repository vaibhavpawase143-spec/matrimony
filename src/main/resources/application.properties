# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=gathbandhan
spring.profiles.active=dev
server.port=9090

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=mySuperSecretKeyForJwtTokenThatIsVerySecure12345
jwt.expiration=86400000

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gathbandhan
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# During Development
spring.jpa.hibernate.ddl-auto=validate

# ==========================================
# FLYWAY
# ==========================================
# Enable after all migration files are created
spring.flyway.enabled=true

# ==========================================
# SQL INITIALIZATION
# ==========================================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.sql.init.continue-on-error=false
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.platform=postgres

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ==========================================
# DEVTOOLS
# ==========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ==========================================
# EMAIL
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.from=noreply@gathbandhan.com

# ==========================================
# APPLICATION URL
# ==========================================
app.base-url=http://localhost:9090

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
file.upload-dir=uploads/

# ==========================================
# JACKSON
# ==========================================
spring.mvc.converters.preferred-json-mapper=jackson

# ==========================================
# HIKARI CONNECTION POOL
# ==========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'

# ==========================================
# LOGGING
# ==========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.example=DEBUG

# ==========================================
# RAZORPAY
# ==========================================
razorpay.api.key=rzp_test_xxxxxxxxx
razorpay.api.secret=xxxxxxxxxxxxxxxx

# ==========================================
# PROKERALA
# ==========================================
prokerala.api.client-id=test
prokerala.api.client-secret=test
prokerala.api.base-url=https://api.prokerala.com

# ==========================================
# SMS
# ==========================================
app.sms.enabled=false
msg91.auth.key=test

# ==========================================
# ERROR CONFIGURATION
# ==========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ==========================================
# CORS
# ==========================================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ==========================================
# UTF-8
# ==========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true