# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=gatbunndhan
server.port=9090

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=mySuperSecretKeyForJwtTokenThatIsVerySecure12345
jwt.expiration=86400000

# ==========================================
# DATABASE CONFIGURATION (PostgreSQL)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5433/gathbandhan
spring.datasource.username=postgres
spring.datasource.password=Pgsql@9090
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT
# use update for normal development
spring.jpa.hibernate.ddl-auto=update
# ==========================================
# SQL INITIALIZATION
# ==========================================

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=false
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.platform=postgres
# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ==========================================
# DEVTOOLS CONFIGURATION
# ==========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ==========================================
# EMAIL CONFIGURATION
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.from=noreply@gathbandhan.com

# ==========================================
# APPLICATION BASE URL
# ==========================================
app.base-url=http://localhost:9090

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==========================================
# STATIC FILE STORAGE
# ==========================================
file.upload-dir=uploads/

# ==========================================
# JACKSON / JSON CONFIGURATION
# ==========================================
spring.mvc.converters.preferred-json-mapper=jackson

# ==========================================
# HIKARI CONNECTION POOL
# ==========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.com.example=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# IMPORTANT FOR SQL DEBUGGING
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# ==========================================
# FLYWAY CONFIGURATION
# ==========================================
spring.flyway.enabled=false

# ==========================================
# RAZORPAY CONFIGURATION
# ==========================================
razorpay.api.key=test
razorpay.api.secret=test

# ==========================================
# PROKERALA CONFIGURATION
# ==========================================
prokerala.api.client-id=test
prokerala.api.client-secret=test
prokerala.api.base-url=https://api.prokerala.com

# ==========================================
# SMS CONFIGURATION
# ==========================================
app.sms.enabled=false
msg91.auth.key=test

# ==========================================
# SERVER ERROR DETAILS
# ==========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ==========================================
# CORS CONFIGURATION
# ==========================================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ==========================================
# UTF-8 ENCODING
# ==========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'

logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG