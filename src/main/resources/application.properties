# ==========================================

# APPLICATION CONFIGURATION

# ==========================================

spring.application.name=gatbunndhan
server.port=9090

# ==========================================

# THYMELEAF CONFIGURATION

# ==========================================

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ==========================================

# DATABASE CONFIGURATION (POSTGRESQL)

# ==========================================

spring.datasource.url=jdbc:postgresql://localhost:5433/gathbandhan
spring.datasource.username=postgres
spring.datasource.password=Pgsql@9090
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================

# JPA / HIBERNATE CONFIGURATION

# ==========================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable Hibernate auto table creation

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================

# SQL FILE EXECUTION (IMPORTANT)

# ==========================================

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/*.sql

# ==========================================

# DISABLE FLYWAY (IMPORTANT)

# ==========================================

spring.flyway.enabled=false

# ==========================================

# FILE UPLOAD CONFIGURATION

# ==========================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================

# LOGGING CONFIGURATION

# ==========================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================

# STATIC FILE STORAGE (PROFILE IMAGES)

# ==========================================

file.upload-dir=uploads/`1=
