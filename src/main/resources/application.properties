# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=gatbunndhan
server.port=9090

# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# ==========================================
# DATABASE CONFIGURATION (POSTGRESQL)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gathbandhan
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Pretty SQL (optional)
spring.jpa.properties.hibernate.format_sql=true

# ?? REMOVED (auto-detected by Hibernate 6)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# SQL FILE EXECUTION
# ==========================================
spring.sql.init.mode=never

# ==========================================
# FLYWAY (future ready)
# ==========================================
spring.flyway.enabled=false

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================
# STATIC FILE STORAGE
# ==========================================
file.upload-dir=uploads/

# ==========================================
# JACKSON / JSON CONFIG
# ==========================================
spring.mvc.converters.preferred-json-mapper=jackson

# ==========================================
# OPTIONAL PERFORMANCE TUNING
# ==========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

jwt.secret=mySuperSecretKeyForJwtTokenThatIsVerySecure12345
jwt.expiration=3600000

sspring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vaibhavpawase143@gmail.com
